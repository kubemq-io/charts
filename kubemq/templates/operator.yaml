{{- if not (lookup "apps/v1" "Deployment" .Release.Namespace "kubemq-operator") }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubemq-operator
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kubemq-operator
  template:
    metadata:
      labels:
        app: kubemq-operator
    spec:
      serviceAccountName: kubemq-operator
      containers:
        - name: kubemq-operator
          image: europe-docker.pkg.dev/kubemq/images/kubemq-operator:next
          command:
            - kubemq-operator
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: WATCH_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: RELATED_IMAGE_KUBEMQ_CLUSTER
              value: "europe-docker.pkg.dev/kubemq/images/kubemq:next"
            - name: CONNECTOR_TARGETS_IMAGE
              value: "kubemq/kubemq-targets:latest"
            - name: CONNECTOR_SOURCES_IMAGE
              value: "kubemq/kubemq-sources:latest"
            - name: CONNECTOR_BRIDGES_IMAGE
              value: "kubemq/kubemq-bridges:latest"

{{- end }}
